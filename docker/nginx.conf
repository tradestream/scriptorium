server {
    listen 6060;
    server_name _;

    # Max upload size for book files
    client_max_body_size 500M;

    # Shared proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # ── Backend API ──────────────────────────────────────────────────────────

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # OPDS catalog (e-readers: Moon+, Kybook, etc.)
    location /opds/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # KOReader progress sync
    location /api/ko/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Kobo device sync (URL-token auth, oversized headers, long downloads)
    location /kobo/ {
        proxy_pass http://127.0.0.1:8000;

        # Kobo sends very large headers with device info
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        # Large book downloads can take a while
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Book cover images (served by FastAPI StaticFiles)
    location /covers/ {
        proxy_pass http://127.0.0.1:8000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket for real-time events
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── SvelteKit frontend (static export) ───────────────────────────────────

    location / {
        root /app/static/frontend;
        try_files $uri $uri/ $uri.html /index.html;

        # Cache static assets aggressively (hashed filenames)
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
