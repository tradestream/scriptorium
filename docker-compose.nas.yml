services:
  scriptorium:
    image: ghcr.io/tradestream/scriptorium:latest
    container_name: scriptorium
    ports:
      - "6060:6060"
    volumes:
      # Persistent data (database, covers, config)
      - /volume1/docker/scriptorium/data/config:/data/config
      - /volume1/docker/scriptorium/data/covers:/data/covers
      - /volume1/docker/scriptorium/data/ingest:/data/ingest

      # Book libraries
      - /volume1/docker/scriptorium/library/books:/data/library/books
      - /volume1/docker/scriptorium/library/books-mature:/data/library/books-mature
      - /volume1/docker/scriptorium/library/comics:/data/library/comics
      - /volume1/docker/scriptorium/library/comics-mature:/data/library/comics-mature
      - /volume1/docker/scriptorium/library/cookbooks:/data/library/cookbooks
      - /volume1/docker/scriptorium/library/art-photography:/data/library/art-photography
      - /volume1/docker/scriptorium/library/art-photography-mature:/data/library/art-photography-mature
      - /volume1/docker/scriptorium/library/playboy-mature:/data/library/playboy-mature
      - /volume1/docker/scriptorium/library/volo-mature:/data/library/volo-mature
      - /volume1/docker/scriptorium/library/academic:/data/library/academic
      - /volume1/docker/scriptorium/library/magazines-periodicals:/data/library/magazines-periodicals
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/config/scriptorium.db
      - LIBRARY_PATH=/data/library
      - INGEST_PATH=/data/ingest
      - CONFIG_PATH=/data/config
      - COVERS_PATH=/data/covers
      - SECRET_KEY=change-me-to-a-random-string
      - CORS_ORIGINS=["https://books.heisui.house","http://192.168.0.68:6060","http://localhost:6060","capacitor://localhost","ionic://localhost"]
      - ABS_URL=https://audiobookshelf.heisui.house
      - ABS_API_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJrZXlJZCI6Ijc0Nzc4OWYyLWE0NzgtNGQ0My1iYmMyLWU4NmUzZDNhMjE3OSIsIm5hbWUiOiJTY3JpcHRvcml1bSIsInR5cGUiOiJhcGkiLCJpYXQiOjE3NzM1MTI0ODd9.oq6-mOka_Ymsf8Dx8sFAxvRLuta4bplPfQMcRASw_Bw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
